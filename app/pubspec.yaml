name: stunner
description: "Stunner — cross-platform, privacy-first P2P encrypted messenger."
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # FFI to the Go core (desktop c-shared library / Android jniLibs).
  ffi: ^2.1.0
  # Render the identity contact code as a QR (pure Dart, no native plugin).
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

name: stunner
description: "Stunner — cross-platform, privacy-first P2P encrypted messenger."
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # FFI to the Go core (desktop c-shared library).
  ffi: ^2.1.0
  # Emoji support.
  emoji_picker_flutter: ^3.1.0
  # Animated emoji (Lottie JSON). APNG/WebP handled by Flutter's image codecs.
  lottie: ^3.1.2
  # File transfer: picking files to send.
  file_picker: ^8.0.0
  # Contact exchange: render your identity as a QR code and scan a peer's.
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/animated_emoji/   # bundled Lottie packs (added in roadmap phase 7)

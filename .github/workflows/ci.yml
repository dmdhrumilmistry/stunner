name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  core:
    name: Go core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          # No go.sum yet: the skeleton uses only the standard library.
          cache: false
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Run headless harness
        run: go run ./cmd/stunnerd

  app:
    name: Flutter app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Generate platform projects
        run: flutter create --platforms=android .
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
